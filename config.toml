# Pexels Background Configuration
# This section configures the random background images for the hero section
# The API key is securely handled via environment variables (see comments above)
[params.pexels]
  # Image search queries for random background images
  # Customize this list to change the types of images that appear
  # The system will randomly select from these queries for each page loads
  queries = [
    "digital health innovation",
    "modern clinical data technology",
    "advanced healthcare architecture",
    "healthcare cybersecurity infrastructure",
    "ai medical research lab",
    "abstract technology leadership",
    "cloud infrastructure engineering dark",
    "minimalist hospital design",
    "biotechnology lab equipment",
    "enterprise software architecture",
    "medical imaging technology",
  ]    