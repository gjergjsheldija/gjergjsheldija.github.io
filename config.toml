baseURL = "https://sheldija.net"
languageCode = "en-us"
title = "Gjergj Sheldija | Princial Architect & Technical Strategist"
theme = "careercanvas"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

[languages]
  [languages.en]
    contentDir = "content/en"
    languageName = "English"
    weight = 1
 

[build]
  writeStats = true      

[params]
name = "Gjergj Sheldija"
email = "gjergj@sheldija.net"
profile_image = "/images/gjergj-sheldija.jpeg"
hero_description = "Transforming technical strategy into enterprise value. Engineering leader with 20+ years of experience scaling HealthTech organizations, optimizing cloud operations, and turning regulatory compliance into a competitive market advantage."
author = "Gjergj Sheldija"
hero_location = "Leipzig, Germany"
tagline = "Engineering Leader. Technical Strategist. Value Driver."
collab_tags = [
    "Technical Strategy & P&L",
    "Scaling Engineering Organizations",
    "Strategic Regulatory Compliance",
    "Cloud-Native Infrastructure",
    "HealthTech Innovation"
]   

[services]
  [services.googleAnalytics]
    id = "G-8CXLE5SNYH" 


og_image = "images/gjergj-sheldija.jpeg"

description = "Principal Architect & Technical Strategist with 20+ years of experience in HealthTech, scaling engineering organizations and driving enterprise value."

linkedin_url = "https://www.linkedin.com/in/gjergjsheldija/"
linkedin_text = "linkedin.com/in/gjergjsheldija"
github_url = "https://github.com/gjergjsheldija"
github_text = "github.com/gjergjsheldija"

copyright = "© 2026 | Gjergj Sheldija"  

resume_url = "/files/gjergj.sheldija.resume.pdf"
resume_label = "View CV"

[[params.social]]
icon = "linkedin-in"
url = "https://www.linkedin.com/in/gjergjsheldija/"

[[params.social]]
icon = "github"
url = "https://github.com/gjergjsheldija"

sectionPagesMenu = 'main'

[taxonomies]
  tag = "tags"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "monokai"

[server]
  [[server.headers]]
    for = "/**/*.css"
    [server.headers.values]
      Content-Type = "text/css"

# Security configuration for environment variables
# Note: We now use serverless functions for secure API key handling
[security]
  [security.funcs]
    getenv = ['^HUGO_', '^CI$']


